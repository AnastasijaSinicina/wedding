<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="invitation">

    <div class="top-ornament">&#10022; &#10022; &#10022;</div>

    <p class="together">Together with their families</p>

    <h1 class="names">Sarah &amp; James</h1>

    <p class="invite-text">joyfully invite you to celebrate their marriage</p>

    <div class="divider"></div>

    <div class="details">
      <div class="detail-block">
        <span class="label">Date</span>
        <span class="value">Saturday, June 14, 2026</span>
      </div>
      <div class="detail-block">
        <span class="label">Time</span>
        <span class="value">4:00 PM</span>
      </div>
      <div class="detail-block">
        <span class="label">Venue</span>
        <span class="value">The Grand Garden Hall</span>
        <span class="sub-value">123 Blossom Lane, New York, NY</span>
      </div>
    </div>

    <div class="divider"></div>

    <p class="rsvp-text">Kindly RSVP by <strong>May 30, 2026</strong></p>
    <a class="rsvp-btn" href="mailto:sarah.james@wedding.com">RSVP Now</a>

    <div class="bottom-ornament">&#10022; &#10022; &#10022;</div>

  </div>

</body>
</html>
